name: Build KAELEN APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Find and fix gradlew
        run: |
          find . -name "gradlew" -type f
          chmod +x $(find . -name "gradlew" -type f | head -1)

      - name: Build Debug APK
        run: |
          GRADLEW=$(find . -name "gradlew" -type f | head -1)
          GRADLE_DIR=$(dirname $GRADLEW)
          cd $GRADLE_DIR && ./gradlew assembleDebug
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KAELEN-debug
          path: "**/build/outputs/apk/debug/*.apk"
